name: Evensong

options:
  bundleIdPrefix: com.jamesonknoll
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0

targets:
  Evensong:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Evensong
    info:
      path: Evensong/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(REVERSED_CLIENT_ID)
            CFBundleURLName: com.jamesonknoll.evensong
        NSUserNotificationUsageDescription: "Evensong uses notifications to remind you to set your daily goals and check in each evening."
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesonknoll.evensong
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Evensong/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          API_BASE_URL: "http://localhost:8080"
          REVERSED_CLIENT_ID: "com.googleusercontent.apps.PLACEHOLDER"
        Release:
          API_BASE_URL: "http://localhost:8080"
          REVERSED_CLIENT_ID: "com.googleusercontent.apps.PLACEHOLDER"
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
