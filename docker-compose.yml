version: '3.3'

services:
  api:
    build:
      context: ./server/
      dockerfile: Dockerfile
    env_file: ./server/.env
    command: >
      sh -c "bundle exec rails db:create db:migrate && bundle exec rails server -b 0.0.0.0 -p 8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  
  postgres:
    image: postgres:14-alpine
    ports: 
      - '5432:5432'
    # volumes:
    #   - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: jamesonknoll
      POSTGRES_DB: three-big-things
      POSTGRES_PASSWORD: password

  client:
    build:
      context: ./client/
    command: yarn start
    volumes:
      - ./client/:/usr/app
      - /usr/app/node_modules
    depends_on:
      - api
    ports:
      - "3000:3000"
